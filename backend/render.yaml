services:
  - type: web
    name: indian-stock-scanner-backend
    env: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gevent --workers 2 --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 5 app:app
    envVars:
      - key: RENDER
        value: true
      - key: FLASK_ENV
        value: production
      - key: BINANCE_API_KEY
        sync: false
